<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#001228;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#001228;padding:40px 20px;">
    <tr><td align="center">
      <table width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background:#001E3D;border:1px solid #002B52;border-radius:12px;padding:40px;">
        <tr><td>
          <h1 style="margin:0 0 8px;font-size:24px;font-weight:900;letter-spacing:3px;color:#7FFF3B;text-align:center;">PRFORGD</h1>
          <h2 style="margin:24px 0 8px;font-size:20px;color:#FFFFFF;text-align:center;">Sign In to PRForgd</h2>
          <p style="margin:0 0 24px;font-size:15px;color:#8AAFC4;line-height:1.6;text-align:center;">
            Tap the button below to sign in to your PRForgd account.
          </p>
          <table width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
            <tr><td align="center">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#7FFF3B;color:#001228;font-size:16px;font-weight:800;letter-spacing:2px;text-decoration:none;padding:14px 32px;border-radius:8px;">SIGN IN</a>
            </td></tr>
          </table>
          <p style="margin:0 0 8px;font-size:13px;color:#4D7A94;line-height:1.6;text-align:center;">
            Or use this OTP code: <strong style="color:#FFFFFF;">{{ .Token }}</strong>
          </p>
          <p style="margin:0;font-size:13px;color:#4D7A94;line-height:1.6;text-align:center;">
            If you didn't request this, you can safely ignore this email.
          </p>
        </td></tr>
      </table>
      <p style="margin:24px 0 0;font-size:12px;color:#4D7A94;text-align:center;">
        PRForgd — Track your Hero WODs, chase your PRs.
      </p>
    </td></tr>
  </table>
</body>
</html>
