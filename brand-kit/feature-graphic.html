<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1024px;
  height: 500px;
  background: #001228;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
}
.container {
  display: flex;
  align-items: center;
  gap: 60px;
}
.logo-section {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.brand-name {
  font-size: 72px;
  font-weight: 900;
  letter-spacing: 6px;
  line-height: 1;
}
.brand-pr {
  color: #7FFF3B;
}
.brand-forgd {
  color: #FFFFFF;
}
.tagline {
  color: #8AAFC4;
  font-size: 22px;
  font-weight: 600;
  margin-top: 16px;
  letter-spacing: 2px;
}
.features {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.feature {
  display: flex;
  align-items: center;
  gap: 12px;
}
.feature-dot {
  width: 10px;
  height: 10px;
  background: #7FFF3B;
  border-radius: 50%;
  flex-shrink: 0;
}
.feature-text {
  color: #FFFFFF;
  font-size: 20px;
  font-weight: 600;
}
.corner { position: absolute; width: 40px; height: 40px; }
.corner-tl { top: 20px; left: 20px; border-top: 3px solid #7FFF3B; border-left: 3px solid #7FFF3B; }
.corner-tr { top: 20px; right: 20px; border-top: 3px solid #7FFF3B; border-right: 3px solid #7FFF3B; }
.corner-bl { bottom: 20px; left: 20px; border-bottom: 3px solid #7FFF3B; border-left: 3px solid #7FFF3B; }
.corner-br { bottom: 20px; right: 20px; border-bottom: 3px solid #7FFF3B; border-right: 3px solid #7FFF3B; }
</style>
</head>
<body>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="container">
    <div class="logo-section">
      <div class="brand-name">
        <span class="brand-pr">PR</span><span class="brand-forgd">FORGD</span>
      </div>
      <div class="tagline">HERO WOD TRACKER</div>
    </div>
    <div class="features">
      <div class="feature"><div class="feature-dot"></div><span class="feature-text">200+ Hero WODs</span></div>
      <div class="feature"><div class="feature-dot"></div><span class="feature-text">Built-in Timer & Splits</span></div>
      <div class="feature"><div class="feature-dot"></div><span class="feature-text">Automatic PR Detection</span></div>
      <div class="feature"><div class="feature-dot"></div><span class="feature-text">130 Exercise Demos</span></div>
      <div class="feature"><div class="feature-dot"></div><span class="feature-text">Sync Across Devices</span></div>
    </div>
  </div>
</body>
</html>
